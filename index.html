<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cool Site</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: white;
            text-align: center;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-size: 3em;
        }

        p {
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4834d4;
        }

        .card {
            background: rgba(255,255,255,0.05);
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 My Website</h1>
    <p>This is my free domain site 😎</p>
    <a href="#" class="btn">Click Me</a>
</header>

<div class="card">
    <h2>🔥 Project</h2>
    <p>Put your game or project here</p>
</div>

<div class="card">
    <h2>📬 Contact</h2>
    <p>Add your socials here</p>
</div>

</body>
</html>
